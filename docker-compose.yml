services:
  backend:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:80"
    env_file:
      - frontend-react/.env.production
    depends_on:
      - backend
