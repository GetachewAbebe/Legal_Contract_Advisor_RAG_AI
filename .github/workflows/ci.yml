name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        # Ensure testing and formatting tools are present
        python -m pip install pytest httpx flake8 black

    - name: Check formatting with black
      run: |
        black --check src tests || echo "Black formatting check failed. Run 'black src tests' locally to fix."

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        OPENAI_API_KEY: "dummy_ci_key"
        PINECONE_API_KEY: "dummy_ci_key"
        PINECONE_INDEX_NAME: "dummy_ci_index"
      run: |
        pytest -v
